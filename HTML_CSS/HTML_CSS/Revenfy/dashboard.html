<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Revenfy</title>

    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="Revenfy.png">

    <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Changa+One:ital@0;1&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>

<body>

<script>
if(localStorage.getItem("sesion") !== "activa"){
    window.location.href = "login.html";
}
</script>

<!-- =======================
     NAVBAR MOBILE CORRECTO
======================= -->

   <div class="mobile-navbar">

    <button class="dash-menu-hamburger"
        onclick="
            document.getElementById('dashSidebar').classList.toggle('open');
            document.getElementById('sidebarOverlay').classList.toggle('visible');
        ">
        <i class="bi bi-list"></i>
    </button>

</div>


<!-- =======================
        DASHBOARD
======================= -->
<div class="dashboard">

    <!-- Overlay -->
<div class="sidebar-overlay" id="sidebarOverlay"></div>
    <!-- SIDEBAR -->
    <aside class="sidebar" id="dashSidebar">

        <div class="logo">
            <img src="Revenfy.png" alt="Revenfy">
        </div>

        <ul>
            <li class="active-item">
                <i class="bi bi-house-door"></i>
                Inicio
            </li>

            <li>
                <i class="bi bi-box-seam"></i>
                Productos
            </li>

            <li>
                <i class="bi bi-receipt"></i>
                Pedidos
            </li>

            <li>
                <i class="bi bi-person"></i>
                Perfil
            </li>
        </ul>

        <button onclick="cerrarSesion()" class="logout">
            Cerrar sesión
        </button>

    </aside>

    <!-- MAIN -->
    <main class="main">

        <h1 id="tituloDashboard">
            Bienvenido a Revenfy
        </h1>


        <!-- COMPRADOR -->
        <div id="dashboardComprador" style="display:none;">
            <div class="cards">
                <div class="card">
                    <h3>Favoritos</h3>
                    <p class="card-data">12 productos</p>
                </div>

                <div class="card">
                    <h3>Carrito</h3>
                    <p class="card-data">3 productos</p>
                </div>

                <div class="card">
                    <h3>Compras</h3>
                    <p class="card-data">8 realizadas</p>
                </div>
            </div>
        </div>

        <!-- VENDEDOR -->
        <div id="dashboardVendedor" style="display:none;">
            <div class="cards">
                <div class="card">
                    <h3>Ventas</h3>
                    <p class="card-data">120 hoy</p>
                </div>

                <div class="card">
                    <h3>Productos</h3>
                    <p class="card-data">45 activos</p>
                </div>

                <div class="card">
                    <h3>Pedidos</h3>
                    <p class="card-data">18 nuevos</p>
                </div>
            </div>
        </div>

               <!-- AMBOS -->
        <div id="dashboardAmbos" style="display:none;">
            <div class="cards">

                <div class="card">
                    <h3>Compras</h3>
                    <p class="card-data">8 realizadas</p>
                </div>

                <div class="card">
                    <h3>Ventas</h3>
                    <p class="card-data">120 hoy</p>
                </div>

                <div class="card">
                    <h3>Estadísticas</h3>
                    <p class="card-data">Actividad completa</p>
                </div>

            </div>
        </div>

    </main>

</div>

<script src="js/dashboard.js"></script>

</body>
</html>
