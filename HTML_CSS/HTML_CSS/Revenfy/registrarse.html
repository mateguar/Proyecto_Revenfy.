<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrarse - Revenfy</title>

    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" href="Revenfy.png">
    <link rel="stylesheet"href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Changa+One:ital@0;1&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>

<div class="login-page">

    <div class="login-card">

        <img src="Revenfy.png" alt="Logo Revenfy">

        <h1>Crear Cuenta</h1>

        <p>Regístrate para comenzar en Revenfy</p>

        <form id="registroForm" class="login-form">

            <input
                type="text"
                id="nombre"
                placeholder="Nombre completo"
                required
            >

            <input
                type="email"
                id="correo"
                placeholder="Correo electrónico"
                required
            >

           <div class="password-container">

    <input
        type="password"
        id="password"
        placeholder="Contraseña"
        required
    >

    <button
        type="button"
        class="toggle-password"
        onclick="togglePassword('password', this)"
    >
        <i class="bi bi-eye"></i>
    </button>

</div>

<div class="password-container">

    <input
        type="password"
        id="confirmarPassword"
        placeholder="Confirmar contraseña"
        required
    >

    <button
        type="button"
        class="toggle-password"
        onclick="togglePassword('confirmarPassword', this)"
    >
        <i class="bi bi-eye"></i>
    </button>

</div>

            <button type="submit" class="btn-login">
                Registrarse
            </button>

        </form>

        <div class="login-footer">
            ¿Ya tienes cuenta?
            <a href="login.html">Iniciar sesión</a>
        </div>

    </div>

</div>

<script src="js/registrarse.js"></script>

</body>
</html>
