<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elige un rol</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" href="Revenfy.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Changa+One:ital@0;1&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>

<section class="role-container">

    <div class="role-card">
        <img src="Revenfy.png" alt="Revenfy">

        <h1>Bienvenido a Revenfy</h1>

        <p>
            ¿Cómo deseas utilizar la plataforma?
        </p>

        <div class="role-options">

            <button class="role-btn comprador" data-rol="comprador">
                Quiero Comprar
            </button>

            <button class="role-btn vendedor" data-rol="vendedor">
                Quiero Vender
            </button>

            <button class="role-btn ambos" data-rol="ambos">
                Quiero Comprar y Vender
            </button>

        </div>

    </div>

</section>

<script src="js/rol.js"></script>


</body>
</html>
